# Aether Plugin 依赖配置
# 此文件是版本要求的单一事实来源 (Single Source of Truth)

cli:
  min_version: "1.0.0"
  recommended_version: "1.13.0"
  # 安装位置 (与 config.yaml 同目录)
  install_dir: "~/.aether"
  install_path:
    linux: "~/.aether/aether"
    darwin: "~/.aether/aether"
    windows: "%USERPROFILE%\\.aether\\aether.exe"
  # 发布源: 主项目 Aether 的 releases
  release_api: "https://forgejo.10cg.pub/api/v1/repos/10CG/Aether/releases"
  # 获取最新版本
  latest_url: "https://forgejo.10cg.pub/api/v1/repos/10CG/Aether/releases/latest"
  # 获取指定版本 (替换 {VERSION})
  version_url: "https://forgejo.10cg.pub/api/v1/repos/10CG/Aether/releases/tags/aether-cli/v{VERSION}"
  # Tag 格式
  tag_format: "aether-cli/v{VERSION}"
  # 二进制命名格式
  binary_format: "aether-{OS}-{ARCH}"  # Windows 添加 .exe
  # 源码仓库
  source_repo: "https://forgejo.10cg.pub/10CG/aether-cli.git"
  # Cloudflare Access 认证配置
  cf_access:
    # 环境变量 (优先级从高到低)
    env_vars:
      - "CF_ACCESS_TOKEN"
      - "CLOUDFLARE_ACCESS_TOKEN"
      - "CF_AUTHORIZATION"
    # 配置文件路径 (优先级从高到低)
    config_files:
      - "~/.cloudflare/access-token"
      - "~/.cfaccess"
      - "~/.config/cloudflare/access-token"
    # Cookie 名称 (用于浏览器导出)
    cookie_name: "CF_Authorization"
    # 如何获取 Token 的说明
    instructions: |
      1. 在浏览器中访问 https://forgejo.10cg.pub 并完成 CF 认证
      2. 打开开发者工具 → Application → Cookies
      3. 复制 CF_Authorization cookie 值
      4. 设置环境变量: export CF_ACCESS_TOKEN="your-token"
         或保存到文件: echo "your-token" > ~/.cfaccess
  # 支持的平台
  platforms:
    - os: linux
      arch: amd64
      binary: "aether-linux-amd64"
    - os: linux
      arch: arm64
      binary: "aether-linux-arm64"
    - os: darwin
      arch: amd64
      binary: "aether-darwin-amd64"
    - os: darwin
      arch: arm64
      binary: "aether-darwin-arm64"
    - os: windows
      arch: amd64
      binary: "aether-windows-amd64.exe"

# 版本兼容性矩阵
compatibility:
  - plugin_version: "0.8.x"
    cli_min: "0.7.0"
    cli_recommended: "0.7.0"
    notes: "故障转移支持、nomad_servers 配置"

  - plugin_version: "0.9.x"
    cli_min: "0.8.0"
    cli_recommended: "0.8.0"
    notes: "TBD"

# 依赖 CLI 的 Skills
dependent_skills:
  - name: aether-doctor
    cli_required: false
    role: "CLI 安装和检测的提供者"

  - name: aether-init
    cli_required: true
    min_version: "0.9.0"

  - name: aether-volume
    cli_required: true
    min_version: "0.9.0"

  - name: aether-deploy
    cli_required: true
    min_version: "0.9.0"

  - name: aether-dev
    cli_required: true
    min_version: "0.9.0"

  - name: aether-rollback
    cli_required: true
    min_version: "0.9.0"

  - name: aether-status
    cli_required: false
    note: "通过 Nomad/Consul API 直接查询"

  - name: aether-deploy-watch
    cli_required: false
    note: "调用 aether-status，不直接使用 CLI"

  - name: aether-setup
    cli_required: false
    note: "只写配置文件"
